name: CI
on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  ci:
    name: Lint, format, test and build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Run ESLint
        run: |
          if [ "$(npm pkg get scripts.lint)" != "{}" ]; then
            npm run lint
          else
            echo "::notice::No lint script found, skipping"
          fi

      - name: Run Prettier check
        run: |
          if [ "$(npm pkg get scripts['format:check'])" != "{}" ]; then
            npm run format:check
          else
            echo "::notice::No format:check script found, skipping"
          fi

      - name: Run tests
        run: |
          if [ "$(npm pkg get scripts.test)" != "{}" ]; then
            npm run test
          else
            echo "::notice::No test script found, skipping"
          fi

      - name: Build project
        run: |
          if [ "$(npm pkg get scripts.build)" != "{}" ]; then
            npm run build
          else
            echo "::notice::No build script found, skipping"
          fi